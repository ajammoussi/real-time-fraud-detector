name: Train & Promote

on:
  push:
    branches: [main]
    paths:
      - "training/**"
      - "scripts/**"
      - "dvc.yaml"
      - "params.yaml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Trigger reason"
        required: false
        default: "manual"

env:
  MLFLOW_TRACKING_URI:   ${{ secrets.MLFLOW_TRACKING_URI }}
  SEAWEED_ACCESS_KEY:    ${{ secrets.SEAWEED_ACCESS_KEY }}
  SEAWEED_SECRET_KEY:    ${{ secrets.SEAWEED_SECRET_KEY }}
  SEAWEED_ENDPOINT:      ${{ secrets.SEAWEED_ENDPOINT }}
  DATALAKE_BUCKET:       ${{ secrets.DATALAKE_BUCKET }}
  POSTGRES_HOST:         ${{ secrets.POSTGRES_HOST }}
  POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
  REDIS_HOST:            ${{ secrets.REDIS_HOST }}
  KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      SEAWEED_ENDPOINT: ${{ secrets.SEAWEED_ENDPOINT || 'http://localhost:9000' }}
      SEAWEED_ACCESS_KEY: ${{ secrets.SEAWEED_ACCESS_KEY || 'minioadmin' }}
      SEAWEED_SECRET_KEY: ${{ secrets.SEAWEED_SECRET_KEY || 'minioadmin' }}
      DATALAKE_BUCKET: ${{ secrets.DATALAKE_BUCKET || 'datalake' }}
      MINIO_ROOT_USER: ${{ secrets.CI_MINIO_ROOT_USER || 'minioadmin' }}
      MINIO_ROOT_PASSWORD: ${{ secrets.CI_MINIO_ROOT_PASSWORD || 'minioadmin' }}
    services:
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: ${{ secrets.CI_MINIO_ROOT_USER || 'minioadmin' }}
          MINIO_ROOT_PASSWORD: ${{ secrets.CI_MINIO_ROOT_PASSWORD || 'minioadmin' }}
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/ready || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
        command: server /data --console-address :9001
    outputs:
      run_id: ${{ steps.train.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements/dev.txt

      - name: Wait for local S3 and create bucket
        run: python scripts/wait_for_s3.py --timeout 60 --create-bucket

      - name: Preflight: required secrets present
        run: |
          test -n "${DATALAKE_BUCKET}" || (echo "::error::Missing DATALAKE_BUCKET" && exit 1)
          test -n "${SEAWEED_ENDPOINT}" || (echo "::error::Missing SEAWEED_ENDPOINT" && exit 1)
          test -n "${MINIO_ROOT_USER}" || (echo "::error::Missing CI_MINIO_ROOT_USER secret (set in repository secrets)" && exit 1)
          test -n "${MINIO_ROOT_PASSWORD}" || (echo "::error::Missing CI_MINIO_ROOT_PASSWORD secret (set in repository secrets)" && exit 1)

      - name: Check lake and seed if empty
        run: bash scripts/pipeline_gate.sh
        env:
          MIN_RAW_FILES: "1"
          SEED_IF_EMPTY: "true"   # bootstrap only on first-ever run

      - name: Train model
        id: train
        run: |
          RUN_ID=$(python training/train.py | grep "Run ID:" | awk '{print $NF}')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Run model quality gates
        run: pytest tests/model -v
      - name: Promote to Staging
        run: python scripts/model_ctl.py promote ${{ steps.train.outputs.run_id }} --stage Staging
