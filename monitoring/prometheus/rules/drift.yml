groups:
  - name: drift_alerts
    rules:
      - alert: FraudDriftHigh
        expr: evidently_drift_score > 0.15
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Feature drift detected (score={{ $value }})"

      - alert: ModelAUCLow
        expr: model_auc_roc < 0.90
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Model AUC dropped below threshold ({{ $value }})"

      - alert: HighPredictionLatency
        expr: histogram_quantile(0.99, sum(rate(prediction_latency_seconds_bucket[5m])) by (le)) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 prediction latency > 100ms"
