apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  namespace: mlops
spec:
  replicas: 2
  selector:
    matchLabels: {app: fraud-api}
  template:
    metadata:
      labels: {app: fraud-api}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: fraud-api
          image: your-registry/fraud-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef: {name: mlops-secrets}
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits:   {cpu: "1",    memory: "1Gi"}
